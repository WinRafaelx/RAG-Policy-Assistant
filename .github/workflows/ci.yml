name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: ttb_policy_assistant_test
          POSTGRES_USER: ttb
          POSTGRES_PASSWORD: ttb_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ttb -d ttb_policy_assistant_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Install audit tooling
        run: python -m pip install pip-audit
      - name: Run tests
        env:
          TTB_TEST_DATABASE_URL: postgresql://ttb:ttb_test_password@127.0.0.1:5432/ttb_policy_assistant_test
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=80
      - name: Run eval gate
        run: python scripts/run_evaluation.py
      - name: Run dependency audit
        run: pip-audit -r requirements.txt
